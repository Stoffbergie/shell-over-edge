name = "soe"
main = "src/worker.ts"
compatibility_date = "2026-06-09"
account_id = "628c0e516646e33b3f22f2e8741bf0a5"
workers_dev = false
upload_source_maps = true
compliance_region = "public"

routes = [
  { pattern = "soe.stoff.dev", custom_domain = true }
]

[observability]
enabled = true
head_sampling_rate = 0.1

[observability.logs]
enabled = true
head_sampling_rate = 0.1
invocation_logs = true
persist = false

[observability.traces]
enabled = true
head_sampling_rate = 0.1
persist = false

[placement]
mode = "smart"

[vars]
BASE_URL = "https://soe.stoff.dev"

[[r2_buckets]]
binding = "SOE_MAILBOX"
bucket_name = "soe-mailbox"
preview_bucket_name = "soe-mailbox-preview"

[triggers]
crons = ["*/30 * * * *"]

[[durable_objects.bindings]]
name = "COMMAND_BRIDGES"
class_name = "CommandBridge"

[[migrations]]
tag = "v1-command-bridge"
new_sqlite_classes = ["CommandBridge"]
