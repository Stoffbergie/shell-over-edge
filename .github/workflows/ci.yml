name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Check
        run: pnpm run typecheck && pnpm run typecheck:test && pnpm run repo:audit

      - name: Validate Worker bundle
        run: pnpm run dry-run

      - name: Ensure checks did not modify files
        run: git diff --exit-code

  compatibility:
    name: Compatibility Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04
          - macos-latest
          - windows-latest
          - windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Test
        run: pnpm run test && pnpm run test:native && pnpm run test:webrtc

      - name: Ensure tests did not modify files
        run: git diff --exit-code

  linux-containers:
    name: Linux Container Agents
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Test generated agents in Linux containers
        run: pnpm run test:containers

      - name: Ensure tests did not modify files
        run: git diff --exit-code
