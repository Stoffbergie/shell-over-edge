name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.1.0
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build native agents
        run: |
          set -euo pipefail
          mkdir -p dist/native
          for item in \
            "x86_64-linux-musl:soe-agent-x86_64-linux-musl:" \
            "aarch64-linux-musl:soe-agent-aarch64-linux-musl:" \
            "x86_64-windows:soe-agent-x86_64-windows.exe:.exe" \
            "aarch64-windows:soe-agent-aarch64-windows.exe:.exe" \
            "x86_64-macos:soe-agent-x86_64-macos:" \
            "aarch64-macos:soe-agent-aarch64-macos:"; do
            IFS=":" read -r target asset suffix <<< "$item"
            zig build --release=small -Dtarget="$target"
            cp "zig-out/bin/soe-agent$suffix" "dist/native/$asset"
            rm -rf zig-out
          done
          for item in \
            "linux:amd64:soe-webrtc-x86_64-linux" \
            "linux:arm64:soe-webrtc-aarch64-linux" \
            "darwin:amd64:soe-webrtc-x86_64-macos" \
            "darwin:arm64:soe-webrtc-aarch64-macos" \
            "windows:amd64:soe-webrtc-x86_64-windows.exe" \
            "windows:arm64:soe-webrtc-aarch64-windows.exe"; do
            IFS=":" read -r goos goarch asset <<< "$item"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "dist/native/$asset" ./native/webrtc
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: dist/native/*
