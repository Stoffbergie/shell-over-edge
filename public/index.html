<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>remote.stoff.dev</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="intro compact">
        <div>
          <p class="eyebrow">remote.stoff.dev</p>
          <h1>Remote Support</h1>
        </div>
        <div class="status-stack">
          <span class="status">API v1</span>
        </div>
      </section>

      <section class="workspace">
        <section class="install-grid">
          <article class="panel">
            <div class="panel-heading">
              <h2>macOS / Linux</h2>
              <button type="button" data-copy-target="shell-connect">Copy</button>
            </div>
            <pre id="shell-connect" class="command-block"></pre>
          </article>
          <article class="panel">
            <div class="panel-heading">
              <h2>Windows</h2>
              <button type="button" data-copy-target="windows-connect">Copy</button>
            </div>
            <pre id="windows-connect" class="command-block"></pre>
          </article>
        </section>

        <section class="panel output-panel">
          <div class="panel-heading">
            <h2>Run command</h2>
            <button type="button" data-copy-target="helper-command">Copy</button>
          </div>
          <pre id="helper-command" class="command-block"></pre>
        </section>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
